---
layout: default
---

<style>
ul.no-bullets {
  list-style-type: none;
  margin: 0;
  padding: 0;
}
</style>

<h2 style='text-align:center'><a style='color:#325028; margin:0'>{{ page.title }}</a></h2>
<h3><a style='color:#325028; margin:0'>{{ page.author }}</a></h3>
{% if page.affiliation %}<h4><a style='color:#325028; margin:0'>{{ page.affiliation}}</a></h4>{% endif %}
<h4><a style='color:#325028; margin:0'>{{ page.date | date: "%B %e, %Y" }}</a></h4>

<p>{{ content }}</p>

<script src="https://utteranc.es/client.js"
        repo="Tools-of-ignorance/tools-of-ignorance.github.io"
        issue-term="pathname"
        label="AC-comment"
        theme="github-light"
        crossorigin="anonymous"
        async>
</script>
