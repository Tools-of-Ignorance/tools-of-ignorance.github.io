---
layout: default
---

<style>
ul.no-bullets {
  list-style-type: none;
  margin: 0;
  padding: 0;
}
h1,h2,h3.no-margin{
  margin:0;
}
</style>

<h1 style='text-align:center' class = 'no-margin'><a>Tools of Ignorance</a></h1>
<h2 style='text-align:center' class = 'no-margin'>Dingers and Data</h2>
<br>

{{content}}

<h2 class = 'no-margin'><a>Featured Posts:</a></h2>

<ul class="no-bullets">
  {% for post in site.posts limit:3 %}
    <li>
      <h3 class="no-margin" style = 'margin-top:15px' href="{{ post.url }}">{{ post.title }}</h3>
      <b>{{ post.author }}</b><br>
      {{ post.date | date: "%B %e, %Y" }} <br>
      <!--tags: {% for tag in post.tags %} {% if forloop.last %} {{ tag }} {% else %} {{ tag }}, {% endif %} {% endfor %} <br> !-->
      {{ post.excerpt_text }}
    </li>
  {% endfor %}
</ul>
