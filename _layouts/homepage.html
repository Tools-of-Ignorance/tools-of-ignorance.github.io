---
layout: default
---

<style>
ul.no-bullets {
  list-style-type: none;
  margin: 0;
  padding: 0;
}
h2.no-margin{
  margin:0;
}
h1.no-margin{
  margin:0;
}
</style>

<h1 style='text-align:center' class = 'no-margin'>Tools of Ignorance</h1>
<h2 style='text-align:center' class = 'no-margin'>Dingers and Data</h2>
<br>

{{content}}

<h2 class = 'no-margin'>Recent Posts:</h2>

<ul class="no-bullets">
  {% for post in site.posts limit:3 %}
    <li>
      <h3 class="no-margin" style = 'margin-top:15px'><a href="{{ post.url }}">{{ post.title }}</a></h3>
      {{ post.date | date: "%B %e, %Y" }} <br>
      tags: {% for tag in post.tags %} {{ tag }}, {% endfor %} <br>
      {{ post.excerpt }}
    </li>
  {% endfor %}
</ul>
